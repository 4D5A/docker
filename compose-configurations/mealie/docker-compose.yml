services:
  mealie:
    image: ghcr.io/mealie-recipes/mealie:v3.12.0
    container_name: mealie
    restart: always
    ports:
     - "9925:9000"
    deploy:
     resources:
       limits:
         memory: 1000M
    volumes:
     - mealie-data:/app/data
    environment:
     ALLOW_SIGNUP: "false"
     PUID: 1000
     PGUID: 1000
     TZ: America/New_York
volumes:
  mealie-data