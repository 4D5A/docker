services:
  paperlessbroker:
    image: docker.io/library/redis:8
    restart: unless-stopped
    volumes:
      - /opt/docker/volumes/paperless-redisdata:/data
  paperlessdb:
    image: docker.io/library/postgres:16
    restart: unless-stopped
    volumes:
      - /opt/docker/volumes/paperless-pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  paperlesswebserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    depends_on:
      - paperlessdb
      - paperlessbroker
    ports:
      - "8010:8000"
    volumes:
      - /opt/docker/volumes/paperless-data:/usr/src/paperless/data
      - /opt/docker/volumes/paperless-media:/usr/src/paperless/media
      - /opt/docker/volumes/paperless-export:/usr/src/paperless/export
      - /opt/docker/volumes/paperless-consume:/usr/src/paperless/consume
    environment:
      PAPERLESS_REDIS: ${PAPERLESS_REDIS}
      PAPERLESS_DBHOST: ${POSTGRES_DBHOST}
      PAPERLESS_DBNAME: ${POSTGRES_DB}
      PAPERLESS_DBUSER: ${POSTGRES_USER}
      PAPERLESS_DBPASSWORD: ${POSTGRES_PASSWORD}
volumes:
  paperless-data:
  paperless-media:
  paperless-export:
  paperless-consume: