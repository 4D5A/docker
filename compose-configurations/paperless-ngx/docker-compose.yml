services:
  broker:
    image: docker.io/library/redis:8-alpine
    restart: unless-stopped
    volumes:
      - /opt/docker/volumes/paperless-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: docker.io/library/postgres:17-alpine
    restart: unless-stopped
    volumes:
      - /opt/docker/volumes/paperless-pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: paperless_db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperless"]
      interval: 30s
      timeout: 10s
      retries: 3

  webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      broker:
        condition: service_healthy
    ports:
      - "8010:8000"
    volumes:
      - /opt/docker/volumes/paperless-data:/usr/src/paperless/data
      - /opt/docker/volumes/paperless-media:/usr/src/paperless/media
      - /opt/docker/volumes/paperless-export:/usr/src/paperless/export
      - /opt/docker/volumes/paperless-consume:/usr/src/paperless/consume
    environment:
      PAPERLESS_REDIS: redis://broker:6379
      PAPERLESS_DBHOST: db
      PAPERLESS_DBUSER: paperless
      PAPERLESS_DBPASS: paperless_db_password

volumes:
  paperless-data:
  paperless-media:
  paperless-pgdata:
  paperless-redisdata: